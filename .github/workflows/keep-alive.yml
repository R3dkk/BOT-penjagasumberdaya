name: Keep Bot Alive
'on':
  schedule:
    # Ping setiap 10 menit untuk mencegah Passenger tidurkan bot
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot health endpoint
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 ${{ secrets.BOT_URL }}/health || echo "000")
          echo "HTTP Status: $RESPONSE"
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Bot is alive!"
          else
            echo "⚠️ Bot returned status $RESPONSE — Passenger mungkin sedang restart proses."
          fi
